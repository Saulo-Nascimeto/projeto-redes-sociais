<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
     *{
        padding: 0%;
        margin: 0%;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
     }

     img {
        display: block;
        max-width: 100%;
     }

     a {
        display: block;
        background-image: linear-gradient(to left,blue, blueviolet, violet, red, yellow );
        color: white;
        text-align: center;
        padding: 10px;
        text-decoration: none;
     }

     a:hover {
        text-decoration: underline;
        background-image: linear-gradient(to left,rgba(0, 0, 255, 0.582), rgba(137, 43, 226, 0.459), rgba(238, 130, 238, 0.459), rgba(255, 0, 0, 0.432), yellow );
     }
    </style>
</head>
<body>
    <img src="imagens/tela-instagram.jpg" alt="Tela instagram">

    <a href="https://www.instagram.com/gustavoguanabara/" target="_blank">Instagram</a>
</body>
</html>
