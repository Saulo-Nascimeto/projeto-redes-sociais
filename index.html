<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saulo-Nascimento | Redes sociais</title>
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    
    <style>
        * {
    margin: 0%;
    padding: 0%;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html, body {
    height: 100vh;
    width: 100vw;
    background-image: url(imagens/fundo-madeira.jpg);
    background-size: cover;
    position: relative;
    background-color: chocolate;
}

main {
    height: 100vh;
    width: 100vw;
}

main > section#telefone{
    position: absolute;
     width: 311px;
    height: 627px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-image: url(imagens/frame-iphone.png);
    background-repeat: no-repeat;
}

main > section > iframe#tela-home{
   position: relative;
   top: 79px;
   left: 20px;
   width: 270px;
   height: 474px;
}
main > section > a {
    display: flex;
    justify-content: right;
}
main > section > a > img.img-radius { 
    height: 50px;
    border-radius: 50% 50%;
    margin: 10px;
    box-shadow: 4px 4px 6px black;
}

main > section > a > img.img-radius:hover {
    position: relative;
    border: 1px solid white;
    transition-duration: 0.3s;
    transform: translate(-5px, -5px);
}
    </style>

</head>
<body>
    <main>

     <section id="telefone">
        <iframe id="tela-home" src="home.html" frameborder="0" name="iframe">Infelizmente seu navegador não é compatível</iframe>
     </section>

     <section>
        <a href="home.html" target="iframe"><img src="imagens/logo-home.jpg" alt="Home" class="img-radius"></a>

        <a href="github.html" target="iframe"><img src="imagens/logo-github.jpg" alt="Github" class="img-radius"></a>

        <a href="instagram.html" target="iframe"><img src="imagens/logo-instagram.jpg" alt="logo instagram" class="img-radius"></a>

        <a href="facebook.html" target="iframe"><img src="imagens/logo-facebook.jpg" alt="Logo facebook" class="img-radius"></a>

        <a href="twitter.html" target="iframe"><img src="imagens/logo-twitter.jpg" alt="Logo twitter" class="img-radius"></a>

        <a href="youtube.html" target="iframe"><img src="imagens/logo-youtube.jpg" alt="logo youtube" class="img-radius"></a>
     </section>

    </main>
</body>
</html>
